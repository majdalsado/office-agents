name: Release Bridge

on:
  push:
    tags:
      - "bridge-v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Release Bridge
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#bridge-v}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" packages/bridge/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::warning::No changelog entry found for ${VERSION}, falling back to Unreleased"
            NOTES=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' packages/bridge/CHANGELOG.md)
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Publish to npm
        working-directory: packages/bridge
        run: npm publish --access public --tag latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
